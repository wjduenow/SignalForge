# Minimal valid Snowflake profile for the v0.2 skeleton adapter (issue #120).
# Exercises the WarehouseAdapter.from_profile dispatch path for
# `type: snowflake` via load_profile, without depending on a real Snowflake
# connection. Snowflake's `schema:` key hydrates DbtProfileTarget.dataset via
# the existing alias; `database:` maps to DbtProfileTarget.database.
signalforge_test:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: xy12345.us-east-1
      user: svc_user
      role: TRANSFORMER
      warehouse: TRANSFORMING
      database: ANALYTICS
      schema: PUBLIC
      threads: 4
      password: "{{ env_var('SNOWFLAKE_PASSWORD', 's3cret') }}"
