# BigQuery profile using a service-account keyfile. SignalForge v0.1 only
# accepts `method: oauth`; this fixture exists to drive the negative test
# that `load_profile` raises `UnsupportedAuthMethodError` (DEC-017) with a
# remediation pointing at `gcloud auth application-default login`.
signalforge_test:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: my-gcp-project
      dataset: analytics
      location: US
      keyfile: /path/to/key.json
