name: ci

on:
  pull_request:
    branches: [main, dev, "release/*"]
  push:
    branches: [main, dev, "release/*"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dev dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pyright
        # Pyright pins to the matrix FLOOR (`pyright.pythonVersion = "3.11"`
        # in pyproject.toml). Running it 3x adds no signal — gate to once.
        if: matrix.python-version == '3.11'
        run: uv run pyright
      - name: Pytest
        run: uv run pytest
      - name: Upload coverage to Codecov
        # Upload from one matrix iteration (3.13, the ceiling) to avoid
        # duplicate uploads. Coverage is interpreter-invariant for this
        # codebase; the choice is conventional, not load-bearing.
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5.5.4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
